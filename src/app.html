<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Claude Code Manager</title>

    <!-- Favicon & app icons -->
    <link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />

    <!-- PWA / home screen -->
    <meta name="theme-color" content="#0e0e12" />
    <meta name="application-name" content="Claude Code Manager" />
    <meta name="apple-mobile-web-app-title" content="Claude Code Manager" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- OpenGraph / link previews (WhatsApp, Telegram, iMessage, Slack…) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Claude Code Manager" />
    <meta property="og:description" content="Manage Claude Code sessions from any device." />
    <meta property="og:image" content="%sveltekit.assets%/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Claude Code Manager" />
    <meta name="twitter:description" content="Manage Claude Code sessions from any device." />
    <meta name="twitter:image" content="%sveltekit.assets%/icon-512.png" />

    %sveltekit.head%
  </head>
  <body
      data-sveltekit-preload-data="hover"
      class="m-0 p-0 h-full bg-bg-0 text-text-0 text-sm font-sans antialiased"
    >
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
