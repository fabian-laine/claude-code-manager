name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux bundles
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync version from tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "Syncing all manifests to version $VERSION"
          # package.json
          sed -i -E "s/^(\s*\"version\":\s*)\"[^\"]+\"/\1\"${VERSION}\"/" package.json
          # tauri.conf.json
          sed -i -E "s/^(\s*\"version\":\s*)\"[^\"]+\"/\1\"${VERSION}\"/" src-tauri/tauri.conf.json
          # Cargo.toml (first version = 1 only, under [package])
          sed -i -E "0,/^version = \"[^\"]+\"/s//version = \"${VERSION}\"/" src-tauri/Cargo.toml
          echo "--- package.json ---" && grep '"version"' package.json
          echo "--- tauri.conf.json ---" && grep '"version"' src-tauri/tauri.conf.json
          echo "--- Cargo.toml ---" && head -5 src-tauri/Cargo.toml | grep '^version'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            file \
            rpm \
            cmake \
            clang

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundles (deb, rpm, appimage) with stt
        run: pnpm tauri build --bundles deb rpm appimage -- --features stt

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find src-tauri/target/release/bundle/deb -name "*.deb" -exec cp {} dist/ \;
          find src-tauri/target/release/bundle/rpm -name "*.rpm" -exec cp {} dist/ \;
          find src-tauri/target/release/bundle/appimage -name "*.AppImage" -exec cp {} dist/ \;
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: dist/*

  release:
    name: Publish GitHub Release
    needs: build-linux
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-bundles
          path: dist

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: dist/*
